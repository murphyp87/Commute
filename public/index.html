<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NJ Commute Optimizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>NJ Commute</h1>
    <p class="subtitle">Drive time + tolls, ranked by value</p>

    <div class="card locations-card">
      <div class="location-row">
        <span class="dot dot-work"></span>
        <div class="location-text">
          <div class="location-label">Work</div>
          <div class="location-addr" id="workAddr">Loading…</div>
        </div>
      </div>
      <div class="location-divider"></div>
      <div class="location-row">
        <span class="dot dot-home"></span>
        <div class="location-text">
          <div class="location-label">Home</div>
          <div class="location-addr" id="homeAddr">Loading…</div>
        </div>
      </div>
    </div>

    <div class="card rate-card">
      <label class="rate-label" for="hourlyRate">My time is worth</label>
      <div class="rate-input-row">
        <span class="rate-symbol">$</span>
        <input type="number" id="hourlyRate" min="1" max="500" step="1">
        <span class="rate-unit">/ hour</span>
      </div>
    </div>

    <div class="dir-buttons">
      <button class="dir-btn btn-home" id="btnToHome" onclick="optimize('toHome')">
        <span class="btn-icon">🏠</span>
        <span class="btn-label">To Home</span>
      </button>
      <button class="dir-btn btn-work" id="btnToWork" onclick="optimize('toWork')">
        <span class="btn-icon">🏢</span>
        <span class="btn-label">To Work</span>
      </button>
    </div>

    <div class="geo-row">
      <button class="geo-btn" id="btnGeo" onclick="useCurrentLocation()">
        📍 Use my current location as start point
      </button>
      <div id="geoStatus" class="geo-status"></div>
    </div>

    <div id="statusBox" class="status-box hidden">
      <div class="spinner"></div>
      <div id="statusText" class="status-text"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
