<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commute</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="header-title">
        <img src="icon-192.png" alt="" class="app-icon" width="40" height="40">
        <div>
          <h1>Commute</h1>
          <p class="subtitle">Drive time + tolls, ranked by value</p>
        </div>
      </div>
      <button id="menuBtn" class="menu-btn" type="button" aria-label="Open settings" aria-haspopup="true" aria-expanded="false">⚙</button>
    </header>

    <div id="settingsPanel" class="settings-panel" hidden role="menu" aria-label="Settings">
      <div class="setting-row">
        <label for="hourlyRate">My time is worth</label>
        <div class="rate-input-row">
          <span class="rate-symbol">$</span>
          <input type="number" id="hourlyRate" min="1" max="500" step="1">
          <span class="rate-unit">/ hr</span>
        </div>
      </div>
      <div class="setting-row">
        <label for="simMinutes">Hide similar within</label>
        <div class="rate-input-row">
          <input type="number" id="simMinutes" min="0" max="60" step="1" class="setting-input-narrow">
          <span class="rate-unit">min</span>
        </div>
      </div>
      <div class="setting-row">
        <label for="simDollars">and within</label>
        <div class="rate-input-row">
          <span class="rate-symbol">$</span>
          <input type="number" id="simDollars" min="0" max="50" step="0.25" class="setting-input-narrow">
        </div>
      </div>
    </div>

    <div class="card locations-card">
      <div class="location-row">
        <span class="dot dot-work"></span>
        <span class="location-label">Work</span>
        <span class="location-addr" id="workAddr">Loading…</span>
      </div>
      <div class="location-row">
        <span class="dot dot-home"></span>
        <span class="location-label">Home</span>
        <span class="location-addr" id="homeAddr">Loading…</span>
      </div>
    </div>

    <label class="geo-toggle-row">
      <input type="checkbox" id="useMyLocation" checked>
      <span>📍 Use my location as starting point</span>
    </label>

    <div class="dir-buttons">
      <button class="dir-btn btn-home" id="btnToHome" onclick="optimize('toHome')">
        <span class="btn-icon">🏠</span>
        <span class="btn-label">To Home</span>
      </button>
      <button class="dir-btn btn-work" id="btnToWork" onclick="optimize('toWork')">
        <span class="btn-icon">🏢</span>
        <span class="btn-label">To Work</span>
      </button>
    </div>

    <div id="statusBox" class="status-box hidden">
      <div class="spinner"></div>
      <div id="statusText" class="status-text"></div>
    </div>

    <div id="resultsSection" class="hidden">
      <div id="resultsMeta" class="results-meta"></div>
      <div id="resultsList" class="results-list"></div>
      <button id="toggleAllBtn" class="toggle-all-btn hidden" type="button">▾ Show all routes</button>
      <div id="allRoutesTable" class="all-routes-table hidden"></div>
    </div>

    <footer id="app-version" class="app-version"></footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
